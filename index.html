<!doctype html>
<html lang="en" style="overflow: hidden !important">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://use.typekit.net/dti3mzf.css" />

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Ad Paws Admin | Gestión de Reservas y Mascotas</title>

    <meta
      name="description"
      content="Panel de administración de Ad Paws para gestionar reservas, servicios, clientes y mascotas en hoteles y guarderías caninas."
    />

    <meta name="author" content="Ad Paws by Casa Pek" />

    <!-- Prevent indexing (recommended for admin panels) -->
    <meta name="robots" content="noindex, nofollow" />

    <!-- Theme -->
    <meta name="theme-color" content="#4B9460" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Ad Paws Admin" />
    <meta
      property="og:description"
      content="Panel de administración para gestionar reservas, mascotas y clientes en Ad Paws."

    <meta property="og:url" content="https://app.adpaws.com.mx" />
    <meta
      property="og:image"
      content="https://adpaws.com.mx/emails/resources/og-admin.png"
    />
    <meta property="og:site_name" content="Ad Paws" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ad Paws Admin" />
    <meta
      name="twitter:description"
      content="Panel de administración de Ad Paws."
    />
    <meta
      name="twitter:image"
      content="https://adpaws.com.mx/emails/resources/og-admin.png"
    />

    <!-- PWA / mobile -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Ad Paws Admin" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <link rel="canonical" href="https://app.adpaws.com.mx" />
